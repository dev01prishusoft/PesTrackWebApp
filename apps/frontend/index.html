<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#2d8a4e" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PesTrack — Frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="global-loader" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      flex-direction: column;
      gap: 16px;
      color: #1e293b;
      font-family: system-ui, -apple-system, sans-serif;
    ">
      <div style="
        width: 50px;
        height: 50px;
        border: 4px solid rgba(45, 138, 78, 0.2);
        border-top: 4px solid #2d8a4e;
        border-radius: 50%;
        animation: global-spin 1s linear infinite;
      "></div>
      <span style="font-weight: 600; letter-spacing: 0.05em; font-size: 14px; text-transform: uppercase; color: #475569;">Loading...</span>
    </div>
    <style>
      @keyframes global-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
