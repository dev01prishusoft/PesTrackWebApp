<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PesTrack — El Gouna Site Findings V6</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" href="/favicon.svg" />
<link rel="mask-icon" href="/favicon.svg" color="#2d8a4e" />
<link rel="apple-touch-icon" href="/favicon.svg" />
<link rel="manifest" href="/manifest.json" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--hh:64px;--grn:#2D8A4E;--grn2:#8CC63F}
html, body { width: 100%; height: 100%; position: fixed; top: 0; left: 0; overflow: hidden; overscroll-behavior: none; }
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;}

/* ── Header ── */
#hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hh);
  background:#fff;border-bottom:1px solid #E2E8F0;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  z-index:3000;box-shadow:0 1px 6px rgba(0,0,0,.1);
}
#hdr-logo{height:52px;object-fit:contain;flex-shrink:0}
#hdr-sub{font-size:.78rem;color:#64748B;font-weight:600;white-space:nowrap;margin-left:2px}
.vdiv{width:1px;height:38px;background:#E2E8F0;flex-shrink:0}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbtn{padding:6px 14px;border-radius:6px;border:1.5px solid #CBD5E1;background:#fff;
  cursor:pointer;font-size:.75rem;font-weight:600;color:#374151;transition:all .15s}
.hbtn:hover{background:#F8FAFC;border-color:#94A3B8}
.hbtn.on{background:#1C2333;color:#fff;border-color:#1C2333}
.hbtn.grn{background:var(--grn);color:#fff;border-color:var(--grn)}
.hbtn.grn:hover{background:#1e6b39}
.hbtn.blue{background:#2563EB;color:#fff;border-color:#2563EB}
.hbtn.blue:hover{background:#1d4ed8}

/* ── Map ── */
#map{position:fixed;top:var(--hh);left:0;right:0;bottom:0}

/* ── Notification ── */
#notif{position:fixed;top:calc(var(--hh)+10px);left:50%;transform:translateX(-50%);
  background:#1C2333;color:#fff;padding:8px 18px;border-radius:20px;
  font-size:.78rem;font-weight:600;z-index:5000;display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.3);white-space:nowrap}

/* ── Modals ── */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:4000;
  display:none;align-items:center;justify-content:center}
.mod{background:#fff;border-radius:10px;padding:20px;width:90%;max-width:400px;
  max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.mod h3{margin-bottom:14px;font-size:.95rem;color:#1C2333}
.mod label{display:block;font-size:.7rem;font-weight:600;color:#64748B;
  margin:8px 0 3px;text-transform:uppercase;letter-spacing:.05em}
.mod input,.mod textarea,.mod select{width:100%;padding:7px 10px;border:1px solid #CBD5E1;
  border-radius:6px;font-size:.8rem;color:#1C2333;outline:none}
.mod input:focus,.mod textarea:focus{border-color:#2D8A4E}
.mbtns{display:flex;gap:8px;margin-top:14px}
.bok{flex:1;padding:8px;background:var(--grn);color:#fff;border:none;
  border-radius:6px;cursor:pointer;font-weight:700;font-size:.8rem}
.bok:hover{background:#1e6b39}
.bcancel{flex:1;padding:8px;background:#f1f5f9;color:#374151;border:1px solid #CBD5E1;
  border-radius:6px;cursor:pointer;font-weight:600;font-size:.8rem}
.sbbtn{width:100%;padding:7px;border:1.5px dashed #CBD5E1;border-radius:6px;
  background:#f8fafc;color:#64748B;cursor:pointer;font-size:.75rem;font-weight:600;
  transition:all .15s}
.sbbtn:hover{border-color:#2D8A4E;color:#2D8A4E}

/* ── Mobile Menu ── */
#mobile-menu-btn {
  display: none;
  background: transparent;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  margin-left: auto;
  color: #1C2333;
  padding: 4px 8px;
}
@media (max-width: 1024px) {
  #mobile-menu-btn {
    display: block;
  }
  .hdr-right {
    display: flex !important;
    position: fixed !important;
    top: var(--hh);
    left: auto;
    bottom: 0;
    right: 0;
    width: 280px;
    height: auto;
    max-height: none;
    background: #fff;
    flex-direction: column;
    align-items: stretch;
    padding: 20px;
    gap: 12px;
    box-shadow: -4px 0 15px rgba(0,0,0,.08);
    border-bottom: none;
    z-index: 2000;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #hdr-logo { max-width: 120px; }
  #mobile-menu-btn { flex-shrink: 0; }
  #site-selector { min-width: 80px !important; }
  .hdr-right.show-mobile {
    transform: translateX(0) !important;
  }
  .hbtn { text-align: left; justify-content: flex-start; order: 1; padding: 10px 14px; border-radius: 8px; }
  #site-selector { flex: 1; min-width: 0; max-width: 150px; font-size: 0.8rem !important; padding: 4px 6px !important; }
  #user-menu-wrap { display: contents !important; }
  #user-menu { display: contents !important; }
  #profile-btn { display: flex !important; position: absolute; left: 20px; top: 22px; pointer-events: none; z-index: 10; }
  #user-menu > div:first-child { order: -1; padding-left: 52px !important; border-bottom: 1px solid #E2E8F0 !important; padding-bottom: 18px !important; padding-top: 4px !important; margin-bottom: 5px; width: 100%; text-align: left; }
  #user-menu > button { order: 999; margin-top: auto; border-top: 1px solid #E2E8F0 !important; padding-top: 18px !important; width: 100%; border-radius: 0; color: #EF4444 !important; font-size: 0.9rem !important; }
}
</style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="login-container" style="display:none;">
  <div id="login-card">
    <img id="login-logo" src="/sotaico-logo.png" alt="SOTAICO Logo">
    <h2 class="login-title">PesTrack</h2>
    <p class="login-subtitle">Sign in to access your properties</p>
    <div id="login-error" class="login-error"></div>
    <div class="input-group">
      <label for="username">Username or email</label>
      <input type="text" id="username" placeholder="Enter username or email" autocomplete="username">
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        <button type="button" id="pw-toggle" class="pw-toggle" onclick="togglePassword()" aria-label="Show password" tabindex="-1">
          <svg id="pw-eye" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button class="login-btn" id="login-btn" onclick="login()">Login</button>
  </div>
</div>

<div id="app-container" style="display:none;">

<div id="hdr">
  <img id="hdr-logo" src="/sotaico-logo.png" alt="PesTrack">
  <div class="vdiv"></div>
  <!-- Hidden until sites load; revealed only when sites.length > 0 (see bootApp). -->
  <select id="site-selector" onchange="changeSite(this.value)" style="display:none;background:#fff;color:#374151;border:1.5px solid #CBD5E1;border-radius:6px;padding:6px 10px;font-size:0.9rem;font-weight:600;font-family:inherit;outline:none;cursor:pointer;"></select>
  <button id="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="Toggle Menu">☰</button>
  <!-- The whole toolbar starts hidden and is revealed only after permissions are
       applied and the sites dropdown is populated (see bootApp), so nothing flashes. -->
  <div class="hdr-right" id="hdr-toolbar" style="display:none">
    <!-- Permission-gated buttons start hidden and are revealed by applyPermissions()
         once the user's role is known, so no button flashes before permissions load. -->
    <button class="hbtn" id="btn-fi" style="display:none" onclick="startFindingsTool()">🔍 Add Finding</button>
    <button class="hbtn" id="btn-cz" style="display:none" onclick="startConstrTool()" title="Drop a construction zone marker">🏗 Constr. Zone</button>
    <button class="hbtn" id="btn-hide-resolved" onclick="toggleHideResolved()" title="Show or hide resolved (green) findings">🟢 Hide Resolved</button>
    <button class="hbtn" id="btn-hide-constr" onclick="toggleHideConstr()" title="Show or hide construction zone icons">🚜 Hide Constr.</button>
    <button class="hbtn" id="btn-only-constr" onclick="toggleOnlyConstr()" title="Show only construction zones — hide findings">👁 Only Constr.</button>
    <button class="hbtn blue" id="btn-export" style="display:none" onclick="exportFindings()" title="Export all findings with photos — use this to back up and share">📤 Export JSON</button>
    <button class="hbtn blue" id="btn-import" style="display:none" onclick="triggerImport()" title="Import findings from a previously exported JSON">📥 Import JSON</button>
    <button class="hbtn" id="btn-pdf" style="display:none;background:#7C3AED;color:#fff;border-color:#7C3AED" onclick="openPdfSortModal()">📋 PDF Report</button>
    <button class="hbtn" id="btn-parcels" style="display:none;background:#0F766E;color:#fff;border-color:#0F766E" onclick="triggerParcelUpload()" title="Upload updated parcels XLSX to refresh the parcel list">📂 Update Parcels</button>
    <input type="file" id="import-json-input" accept=".json" style="display:none" onchange="importFindings(this)">
    <input type="file" id="parcel-xlsx-input" accept=".xlsx,.xls" style="display:none" onchange="importParcelsXlsx(this)">
    <div id="user-menu-wrap" style="position:relative;display:none">
      <button id="profile-btn" type="button" onclick="toggleUserMenu(event)" title="Account" aria-haspopup="true" aria-expanded="false"
        style="width:38px;height:38px;border-radius:50%;border:1.5px solid #CBD5E1;background:#fff;color:#334155;font-size:0.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1">
        <span id="profile-initials">?</span>
      </button>
      <div id="user-menu" style="display:none;position:absolute;top:calc(100% + 8px);right:0;min-width:200px;background:#fff;border:1px solid #E2E8F0;border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,0.14);z-index:1200;overflow:hidden">
        <div style="padding:12px 14px;border-bottom:1px solid #F1F5F9">
          <div id="user-menu-name" style="font-size:0.9rem;font-weight:700;color:#1E293B;word-break:break-word"></div>
          <span id="user-menu-role" style="display:inline-block;margin-top:5px;padding:1px 9px;border-radius:10px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;color:#fff"></span>
        </div>
        <button type="button" onclick="logout()" style="width:100%;text-align:left;padding:11px 14px;background:none;border:none;font-size:0.86rem;font-weight:600;color:#EF4444;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit"
          onmouseover="this.style.background='#FEF2F2'" onmouseout="this.style.background='none'">
          <span>⏻</span> Logout
        </button>
      </div>
    </div>
  </div>
</div>

<!-- PDF Sort Modal -->
<div class="mov" id="m-pdf-sort" style="display:none">
  <div class="mod" style="max-width:340px">
    <h3>📋 PDF Report — Sort Order</h3>
    <p style="font-size:.78rem;color:#64748B;margin:0 0 12px">Choose how findings are ordered in the report:</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:.85rem;padding:4px 0;text-transform:none;text-align:left;">
        <input type="radio" name="pdf-sort" value="number" checked style="accent-color:#7C3AED;margin-top:2px;width:auto;height:auto;">
        <div style="display:flex;flex-direction:column;gap:1px">
          <strong>Finding #</strong>
          <span style="color:#94A3B8;font-size:.75rem">(default — sequential order)</span>
        </div>
      </label>
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:.85rem;padding:4px 0;text-transform:none;text-align:left;">
        <input type="radio" name="pdf-sort" value="category" style="accent-color:#7C3AED;margin-top:2px;width:auto;height:auto;">
        <div style="display:flex;flex-direction:column;gap:1px">
          <strong>By Category</strong>
          <span style="color:#94A3B8;font-size:.75rem">(grouped by pest type)</span>
        </div>
      </label>
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:.85rem;padding:4px 0;text-transform:none;text-align:left;">
        <input type="radio" name="pdf-sort" value="escalated" style="accent-color:#7C3AED;margin-top:2px;width:auto;height:auto;">
        <div style="display:flex;flex-direction:column;gap:1px">
          <strong>By Assigned / Escalated To</strong>
          <span style="color:#94A3B8;font-size:.75rem">(based on most recent escalation)</span>
        </div>
      </label>
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:.85rem;padding:4px 0;text-transform:none;text-align:left;">
        <input type="radio" name="pdf-sort" value="quadrant" style="accent-color:#7C3AED;margin-top:2px;width:auto;height:auto;">
        <div style="display:flex;flex-direction:column;gap:1px">
          <strong>By Quadrant &amp; Parcel</strong>
          <span style="color:#94A3B8;font-size:.75rem">(NW → NE → SW → SE, then by parcel/area)</span>
        </div>
      </label>
    </div>
    <div class="mbtns">
      <button class="bcancel" onclick="document.getElementById('m-pdf-sort').style.display='none'">Cancel</button>
      <button class="bok" style="background:#7C3AED;border-color:#7C3AED" onclick="launchPdfWithSort()">Generate PDF</button>
    </div>
  </div>
</div>


<div id="notif"></div>
<div id="map"></div>

let map, notifTimer;

function toggleMobileMenu() {
  const toolbar = document.getElementById('hdr-toolbar');
  if (toolbar) {
    toolbar.classList.toggle('show-mobile');
  }
}

// Close mobile menu when a button inside it is clicked or outside click
document.addEventListener('click', function(e) {
  if (window.innerWidth <= 1024) {
    const toolbar = document.getElementById('hdr-toolbar');
    const menuBtn = document.getElementById('mobile-menu-btn');
    if (toolbar && toolbar.classList.contains('show-mobile')) {
      const clickedOnButton = e.target.closest('.hbtn') || e.target.closest('button');
      const clickedOutside = !toolbar.contains(e.target) && !menuBtn.contains(e.target);
      
      if ((toolbar.contains(e.target) && clickedOnButton && e.target.id !== 'profile-btn') || clickedOutside) {
        toolbar.classList.remove('show-mobile');
      }
    }
  }
});

function showNotif(msg, err=false, dur=3000){
  const n=document.getElementById('notif');
  n.textContent=msg; n.style.display='block';
  n.style.background=err?'#c0392b':'#1C2333';
  clearTimeout(notifTimer);
  // Error messages always stay 6 seconds so they're not missed. Non-error
  // messages keep their caller-specified duration (dur=0 = stay until replaced).
  if(err) dur=6000;
  if(dur>0) notifTimer=setTimeout(()=>n.style.display='none',dur);
}

function init(){
  // Header logo is set in the markup (src="/sotaico-logo.png") and sized via CSS.

  map = L.map('map',{center:[27.3949,33.6782],zoom:14,zoomControl:true});

  // ── Tile layer switcher — works from file:// and localhost ─────────
  const osm = L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors', maxZoom:20 }
  );
  const cartoVoyager = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    { attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors © <a href="https://carto.com">CARTO</a>', subdomains:'abcd', maxZoom:20 }
  );
  const esriSatellite = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution:'© Esri, Maxar, Earthstar Geographics, and the GIS User Community', maxZoom:20 }
  );

  osm.addTo(map);

  L.control.layers({
    '🌍 OpenStreetMap':   osm,
    '🗺 Voyager (CARTO)': cartoVoyager,
    '🛰 Satellite (Esri)': esriSatellite
  }, {}, { position:'topright', collapsed:false }).addTo(map);
  setTimeout(()=>map.invalidateSize(),300);
  window.addEventListener('resize',()=>map.invalidateSize());
}

// ── Export findings as JSON file (photos compressed for sharing) ──
async function exportFindings(){
  if(!window._ptFindings || window._ptFindings.length === 0){
    showNotif('⚠️ No findings to export yet', true, 3000);
    return;
  }
  const btn = document.getElementById('btn-export');
  if(btn){ btn.disabled=true; btn.textContent='⏳ Compressing…'; }

  // Re-compress photos to export-safe size (400px, 40% JPEG)
  async function compressForExport(dataUrl){
    const src = await photoToDataUri(dataUrl);
    if(!src) return dataUrl;
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{
        try{
          const MAX=400;
          let w=img.width, h=img.height;
          if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
          const c=document.createElement('canvas'); c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          resolve(c.toDataURL('image/jpeg',0.40));
        }catch(e){
          console.warn('Photo export skipped:', e.message);
          resolve(src);
        }
      };
      img.onerror=()=>resolve(src);
      img.src=src;
    });
  }

  try{
    const exportFinds = [];
    for(const loc of window._ptFindings){
      const visits=[];
      for(const v of loc.visits){
        const photos=await Promise.all((v.photos||[]).map(p=>compressForExport(p)));
        visits.push({...v, photos});
      }
      exportFinds.push({...loc, visits});
    }

    const date = new Date().toISOString().slice(0,10);
    const payload = {
      source:'PesTrack_SiteManager', client:'ElGouna',
      exportDate: date, includesPhotos: true,
      findings: exportFinds,
      constructionZones: window._ptConstrZones || []
    };
    const json = JSON.stringify(payload);
    const kb = Math.round(json.length/1024);
    const blob = new Blob([json], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ElGouna_Findings_${date}.json`;
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
    showNotif(`✅ Exported ${window._ptFindings.length} finding(s) — ${kb}KB`);
  }catch(err){
    showNotif('❌ Export failed: '+err.message, true, 4000);
  }finally{
    if(btn){ btn.disabled=false; btn.textContent='📤 Export JSON'; }
  }
}
window.exportFindings = exportFindings;

// ── Import findings from JSON file ───────────────────────────────
function triggerImport(){
  document.getElementById('import-json-input').value='';
  document.getElementById('import-json-input').click();
}
window.triggerImport = triggerImport;

function importFindings(input){
  const file = input.files[0];
  if(!file) return;

  if (!window._PARCELS || window._PARCELS.length === 0) {
    if (!confirm("⚠️ No parcels loaded. Upload Parcel XLSX first, then import JSON.")) {
      return;
    }
  }

  const reader = new FileReader();
  reader.onload = e => {
    // Step 1: parse JSON — only this throws "Invalid JSON"
    let parsed;
    try{ parsed = JSON.parse(e.target.result); }
    catch(err){ showNotif('❌ Invalid JSON file', true, 4000); return; }

    // Step 2: validate contents
    const incoming = Array.isArray(parsed) ? parsed : (parsed.findings || []);
    if(!Array.isArray(incoming) || incoming.length === 0){
      showNotif('⚠️ No findings found in file', true, 4000); return;
    }

    // Step 3: confirm with user
    const existing = window._ptFindings && window._ptFindings.length > 0;
    const msg = existing
      ? `Replace all ${window._ptFindings.length} current finding(s) with ${incoming.length} from this file?\n\nThis cannot be undone.`
      : `Import ${incoming.length} finding(s) from this file?`;
    if(!confirm(msg)) return;

    // Step 4: load into dashboard — retry until findings module is ready (max 3s)
    const czArr = parsed.constructionZones || [];
    function tryLoad(attempts){
      if(typeof window._importFindingsData === 'function'){
        window._importFindingsData(incoming, czArr);
        showNotif(`✅ Imported ${incoming.length} finding(s)`);
      } else if(attempts > 0){
        setTimeout(()=>tryLoad(attempts-1), 150);
      } else {
        showNotif('❌ Map not ready — try again in a moment', true, 4000);
      }
    }
    tryLoad(20);
  };
  reader.readAsText(file);
}
window.importFindings = importFindings;

  open:     {label:'1st Offense', color:'#FB923C', emoji:'🟠'},

};

// ════════════════════════════════════════════════════════════════════
// PARCEL → QUADRANT TABLE (EDIT THIS TABLE ONLY)
// ════════════════════════════════════════════════════════════════════
// Parcels come exclusively from the API (GET /api/parcels). No built-in list —
// upload parcels via "📂 Update Parcels" if a site has none.

// Normalize quadrant labels from the API/XLSX ("Gouna NW", "nw", etc.) → NW|NE|SW|SE.
function normalizeQuad(q){
  if(q == null || q === '') return '';
  const s = String(q).trim().toUpperCase();
  for(const code of ['NW','NE','SW','SE']){
    if(s === code || s.endsWith(' ' + code) || s.endsWith(code)) return code;
  }
  const m = s.match(/\b(NW|NE|SW|SE)\b/);
  return m ? m[1] : s.slice(0, 2);
}
window.normalizeQuad = normalizeQuad;

function parcelHasCoords(p){
  return p && p.lat != null && p.lng != null && !isNaN(p.lat) && !isNaN(p.lng);
}

// ── Parcel loader ──────────────────────────────────────────────────
function loadParcels() {
  if (!currentSiteId) return Promise.resolve();
  const token = localStorage.getItem('pt_token');
  return fetch('/api/parcels?siteId=' + currentSiteId, {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(res => {
    if (res.status === 401) { handleUnauthorized(); throw new Error('Unauthorized'); }
    if (!res.ok) throw new Error('Failed to fetch parcels');
    return res.json();
  })
  .then(data => {
    parcels = data.parcels; // store db objects with id
    // Use only API/DB parcels — no built-in fallback, so every dropdown entry
    // maps to a real parcel_id.
    window._PARCELS = data.parcels.map(p => ({
      id: p.id,
      name: p.parcel_name,
      quad: normalizeQuad(p.quadrant),
      lat: p.lat != null ? Number(p.lat) : null,
      lng: p.lng != null ? Number(p.lng) : null
    }));
    if (window._PARCELS.length === 0) {
      showNotif('⚠️ No parcels found for this site — upload parcels via "📂 Update Parcels".', true, 6000);
    }
    buildParcelSelect();
    updateParcelBadge();
  })
  .catch(err => {
    console.error(err);
    parcels = [];
    window._PARCELS = [];
    showNotif('❌ Failed to load parcels', true, 3000);
    buildParcelSelect();
    updateParcelBadge();
  });
}

// ── XLSX parcel importer ──────────────────────────────────────────
function importParcelsXlsx(input){
  const file = input.files[0];
  if(!file){ return; }
  if (requireSite()) { input.value = ''; return; }

  showNotif('⏳ Uploading parcel list...', false, 0);
  const formData = new FormData();
  formData.append('file', file);
  formData.append('siteId', currentSiteId);
  
  const token = localStorage.getItem('pt_token');
  fetch('/api/parcels/upload', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: formData
  })
  .then(res => {
    if (res.status === 401) { handleUnauthorized(); throw new Error('Unauthorized'); }
    if (!res.ok) throw new Error('Upload failed');
    return res.json();
  })
  .then(data => {
    loadParcels().then(() => {
      showNotif('✅ Parcel list updated');
    });
  })
  .catch(err => {
    console.error(err);
    showNotif('❌ Failed to upload parcels', true, 3000);
  });
  input.value = '';
}
window.importParcelsXlsx = importParcelsXlsx;

function updateParcelBadge(){
  const btn = document.getElementById('btn-parcels');
  if(!btn) return;
  const n = (window._PARCELS||[]).filter(p=>!p.name.includes('General')).length;
  // Show the loaded parcel count on the button when parcels exist; otherwise
  // just the plain label.
  btn.textContent = n > 0 ? `📂 Parcels (${n})` : '📂 Update Parcels';
  btn.title = `${n} parcels loaded — click to update`;
}
window._QUADS = {NW:'Gouna NW', NE:'Gouna NE', SW:'Gouna SW', SE:'Gouna SE'};
window._QUAD_ORDER = ['NW','NE','SW','SE'];
window._nearestParcel = function(lat, lng){
  const P = window._PARCELS || [];
  if(!P || P.length === 0 || lat == null || lng == null) return null;

  const withCoords = P.filter(p => parcelHasCoords(p));
  const namedParcels = withCoords.filter(p => !p.name.includes('General Area'));
  const generalAreas = withCoords.filter(p => p.name.includes('General Area'));

  let best = null;
  let bestDist = Infinity;
  for(let i = 0; i < namedParcels.length; i++){
    const p = namedParcels[i];
    const dlat = p.lat - lat;
    const dlng = p.lng - lng;
    const dist = Math.sqrt(dlat * dlat + dlng * dlng);
    if(dist < bestDist){
      bestDist = dist;
      best = p;
    }
  }
  if(best) return best;

  // Fallback: nearest general-area parcel (same as built-in ElGouna list behaviour).
  for(let i = 0; i < generalAreas.length; i++){
    const p = generalAreas[i];
    const dlat = p.lat - lat;
    const dlng = p.lng - lng;
    const dist = Math.sqrt(dlat * dlat + dlng * dlng);
    if(dist < bestDist){
      bestDist = dist;
      best = p;
    }
  }
  return best || null;
};

function setParcelDropdown(parcelName){
  const sel = document.getElementById('fi-parcel');
  if(!sel || !parcelName) return;
  const p = (window._PARCELS || []).find(x => x.name === parcelName);
  if(p && ![...sel.options].some(o => o.value === parcelName)){
    const q = normalizeQuad(p.quad);
    const quads = window._QUAD_ORDER || ['NW','NE','SW','SE'];
    let og = null;
    if(quads.includes(q)){
      const label = (window._QUADS && window._QUADS[q]) || q;
      og = [...sel.querySelectorAll('optgroup')].find(g => g.label === label);
      if(!og){
        og = document.createElement('optgroup');
        og.label = label;
        sel.appendChild(og);
      }
    } else {
      og = [...sel.querySelectorAll('optgroup')].find(g => g.label === 'Other');
      if(!og){
        og = document.createElement('optgroup');
        og.label = 'Other';
        sel.appendChild(og);
      }
    }
    const opt = document.createElement('option');
    opt.value = p.name;
    opt.textContent = p.name;
    og.appendChild(opt);
  }
  sel.value = parcelName;
}
window.setParcelDropdown = setParcelDropdown;

function resolveParcelId(parcelName, lat, lng){
  const _norm = s => (s || '').trim().toLowerCase();
  let chosen = parcelName;
  if(!chosen && lat != null && lng != null){
    const nearest = window._nearestParcel(lat, lng);
    chosen = nearest ? nearest.name : null;
  }
  if(!chosen) return null;
  const fromList = (window._PARCELS || []).find(p => _norm(p.name) === _norm(chosen));
  if(fromList && fromList.id) return fromList.id;
  const fromDb = parcels.find(p => _norm(p.parcel_name) === _norm(chosen));
  return fromDb ? fromDb.id : null;
}
window.resolveParcelId = resolveParcelId;
window._quadOfLoc = function(loc){
  if(loc && loc.parcel){
    const p = (window._PARCELS||[]).find(p=>p.name===loc.parcel);
    if(p) return p.quad;
  }
  const np = (loc && typeof loc.lat==='number') ? window._nearestParcel(loc.lat, loc.lng) : null;
  return np ? np.quad : null;
};

// ── Parcel dropdown builder (call any time _PARCELS changes) ─────
function buildParcelSelect(){
  const parcelSel = document.getElementById('fi-parcel');
  if(!parcelSel) return;
  const currentVal = parcelSel.value;
  parcelSel.innerHTML = '';
  // Blank option
  const blank = document.createElement('option');
  blank.value = ''; blank.textContent = '— Auto-detect —';
  parcelSel.appendChild(blank);
  const quads = window._QUAD_ORDER || ['NW','NE','SW','SE'];
  const listed = new Set();
  quads.forEach(q => {
    const og = document.createElement('optgroup');
    og.label = (window._QUADS && window._QUADS[q]) || q;
    const parcelsInQuad = (window._PARCELS || []).filter(p => normalizeQuad(p.quad) === q && !p.name.includes('General Area'));
    parcelsInQuad.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name;
      og.appendChild(opt);
      listed.add(p.name);
    });
    if(parcelsInQuad.length) parcelSel.appendChild(og);
  });
  // Parcels whose quadrant didn't match NW/NE/SW/SE still need to be selectable.
  const unmatched = (window._PARCELS || []).filter(p => !p.name.includes('General Area') && !listed.has(p.name));
  if(unmatched.length){
    const og = document.createElement('optgroup');
    og.label = 'Other';
    unmatched.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name;
      og.appendChild(opt);
    });
    parcelSel.appendChild(og);
  }
  // Restore previous selection if still valid
  if(currentVal) setParcelDropdown(currentVal);
}
window.buildParcelSelect = buildParcelSelect;

function onConstrMapClick(e){

  }
  constrTool = false;

  .then(data => {

function deleteConstrZone(czId){
  if (currentUser && currentUser.role === 'client_viewer') {
    showNotif('⚠️ Viewers cannot delete construction zones', true, 3000);
    return;
  }
  if(!confirm('Remove this construction zone?')) return;
  
  const token = localStorage.getItem('pt_token');
  showNotif('⏳ Removing construction zone...', false, 0);
  
  fetch(`/api/zones/${encodeURIComponent(czId)}?siteId=${encodeURIComponent(currentSiteId)}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(res => {
    if (res.status === 401) { handleUnauthorized(); throw new Error('Unauthorized'); }
    // 404 = the zone was already deleted by another user. Refresh to drop the
    // ghost marker, then show the "already deleted" message.
    if (res.status === 404) {
      return res.json().catch(() => ({})).then(d => {
        const err = new Error(d.error || 'This record was already deleted by another user.');
        err.recordDeleted = true;
        throw err;
      });
    }
    if (!res.ok) throw new Error('Failed to delete zone');
    loadConstrZones();
    showNotif('🗑 Construction zone removed');
  })
  .catch(err => {
    console.error(err);
    if (err && err.recordDeleted) {
      Promise.resolve(loadConstrZones()).then(() => showNotif('⚠️ ' + err.message, true, 6000));
      return;
    }
    showNotif('❌ Failed to remove construction zone', true, 3000);
  });
}
window.deleteConstrZone = deleteConstrZone;

function addVisitToLocation(locId){
  editingLocId = locId;
  pendingPhotos = [];
  document.getElementById('fi-photo-preview').innerHTML = '';
  // Resolve loc first so it can be used below
  const loc = findings.find(f=>f.locId===locId);
  // A new visit belongs to this finding's location — bind its existing lat/lng
  // into the coords field (and pendingFindingLL) instead of leaving it blank.
  if(loc && typeof loc.lat === 'number' && typeof loc.lng === 'number'){
    pendingFindingLL = { lat: loc.lat, lng: loc.lng };
    document.getElementById('fi-coords').value =
      loc.lat.toFixed(6) + ', ' + loc.lng.toFixed(6);
  } else {
    pendingFindingLL = null;
    document.getElementById('fi-coords').value = '';
  }
  const _prevLbl = loc && loc.visits[0] ? loc.visits[0].label : '';
  document.getElementById('fi-lbl').value = _prevLbl;
  document.getElementById('fi-notes').value = '';
  document.getElementById('fi-escalated').value = '';
  document.getElementById('fi-date').value = new Date().toISOString().slice(0,10);
  // Set parcel dropdown — inherit from finding or auto-detect from its GPS
  if(loc && loc.parcel) {
    setParcelDropdown(loc.parcel);
  } else if(loc && typeof loc.lat === 'number' && typeof loc.lng === 'number') {
    const np = window._nearestParcel(loc.lat, loc.lng);
    if(np) setParcelDropdown(np.name);
    else document.getElementById('fi-parcel').value = '';
  } else {
    document.getElementById('fi-parcel').value = '';
  }
  // Any prior visit = repeat offense (not just if previously resolved)
  const hasHistory = loc && loc.visits.length > 0;
  const autoStat = hasHistory ? 'repeat' : 'open';
  setFiStat(autoStat, document.getElementById('sb-'+autoStat));
  // Pre-fill category from most recent visit
  const lastCat = loc && loc.visits[0] ? loc.visits[0].cat : 'stp_trench';
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('sel', b.dataset.id === lastCat));
  selectedCat = lastCat;
  const _h3=document.querySelector('#m-fi .mod h3'); if(_h3) _h3.textContent = '🔍 Site Finding';
  document.getElementById('m-fi').style.display = 'flex';
  map.closePopup();
}

// ── Edit existing visit ────────────────────────────────────────────
// Opening the editor re-fetches the finding from the server so we work off the
// latest data. If it's gone (another user deleted it), we don't open the dialog —
// we show the "already deleted" message and refresh the map instead.
function editVisit(locId, visitId){
  const token = localStorage.getItem('pt_token');
  fetch('/api/findings/' + encodeURIComponent(locId) + '?siteId=' + encodeURIComponent(currentSiteId), {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(res => {
    if (res.status === 401) { handleUnauthorized(); throw new Error('Unauthorized'); }
    if (res.status === 404) {
      return res.json().catch(() => ({})).then(d => {
        const err = new Error(d.error || 'This record was already deleted by another user.');
        err.recordDeleted = true;
        throw err;
      });
    }
    if (!res.ok) throw new Error('Failed to open finding');
    return res.json();
  })
  .then(data => {
    const fresh = mapApiFinding(data.finding);
    // Merge the freshly-loaded finding into the local list so the map + editor agree.
    const idx = findings.findIndex(f => f.locId === locId);
    if (idx >= 0) findings[idx] = fresh; else findings.push(fresh);
    const visit = fresh.visits.find(v => v.id === visitId);
    if (!visit) {
      // The finding still exists but this specific visit was deleted. Show the
      // message AFTER the refresh so loadFindings' own notif doesn't clobber it.
      Promise.resolve(loadFindings()).then(() =>
        showNotif('⚠️ This record was already deleted by another user.', true, 6000)
      );
      return;
    }
    openEditVisitDialog(fresh, visit);
  })
  .catch(err => {
    console.error(err);
    if (err && err.recordDeleted) {
      Promise.resolve(loadFindings()).then(() => showNotif('⚠️ ' + err.message, true, 6000));
      return;
    }
    showNotif('❌ ' + (err && err.message ? err.message : 'Failed to open finding'), true, 3000);
  });
}
window.editVisit = editVisit;

function captureGPS() {
  const btn = document.getElementById('btn-capture-gps');
  if (!navigator.geolocation) {
    showNotif('❌ Geolocation is not supported by your browser', true, 5000);
    return;
  }
  const originalHTML = btn.innerHTML;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4 12H2M22 12h-2"></path><circle cx="12" cy="12" r="6"></circle></svg> Fetching...`;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = parseFloat(pos.coords.latitude.toFixed(6));
      const lng = parseFloat(pos.coords.longitude.toFixed(6));
      document.getElementById('fi-coords').value = `${lat}, ${lng}`;
      
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"></path></svg> Captured!`;
      setTimeout(() => btn.innerHTML = originalHTML, 3000);
      
      // Auto-set nearest parcel if available
      const nearestP = window._nearestParcel ? window._nearestParcel(lat, lng) : null;
      if (nearestP) setParcelDropdown(nearestP.name);
    },
    (err) => {
      showNotif('❌ Failed to get location: ' + err.message, true, 5000);
      btn.innerHTML = originalHTML;
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

// ── Photo handling ─────────────────────────────────────────────────
function compressPhoto(dataUrl, cb){
  const img = new Image();
  img.onload = () => {
    const MAX = 800;
    let w = img.width, h = img.height;
    if(w > MAX || h > MAX){
      if(w > h){ h = Math.round(h * MAX/w); w = MAX; }
      else { w = Math.round(w * MAX/h); h = MAX; }
    }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(c.toDataURL('image/jpeg', 0.65));
  };
  img.src = dataUrl;
}

function handleFiPhotos(input){
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      // Defer the S3 upload until the visit is saved. Here we only compress and
      // keep the photo locally as a base64 data-URI for instant preview, so
      // cancelling the dialog never leaves orphaned uploads in the bucket.
      compressPhoto(e.target.result, compressed => {
        pendingPhotos.push(compressed);
        renderPhotoPreview();
      });
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}
window.handleFiPhotos = handleFiPhotos;

function renderPhotoPreview(){
  const div = document.getElementById('fi-photo-preview');
  div.innerHTML = '';
  pendingPhotos.forEach((b64, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-wrap';
    // Image opens the lightbox; the corner ✕ button removes the photo.
    wrap.innerHTML =
      `<img src="${b64}" title="Click to enlarge" onclick="openLightbox('${b64}')">` +
      `<button type="button" class="fi-photo-del" title="Remove photo" onclick="removePendingPhoto(${i})">✕</button>`;
    div.appendChild(wrap);
  });
}

function removePendingPhoto(i){
  pendingPhotos.splice(i,1);
  renderPhotoPreview();
}
window.removePendingPhoto = removePendingPhoto;

// ── Save finding ───────────────────────────────────────────────────
// ── Parse GPS coordinates from text ──────────────────────────────
// Accepts: "29.9612, 30.9874"  "29.9612 30.9874"  "29°57'40"N, 30°59'14"E"
function parseCoords(str){
  if(!str) return null;
  str = str.trim();
  // 1. Decimal degrees: "29.9612, 30.9874"
  const dec = str.match(/(-?\d+\.?\d*)[,\s\t]+(-?\d+\.?\d*)/);
  if(dec){
    const lat = parseFloat(dec[1]), lng = parseFloat(dec[2]);
    if(lat>=-90&&lat<=90&&lng>=-180&&lng<=180) return {lat,lng};
  }
  // 2. Degrees decimal-minutes: "29°57.6102'N 30°58.9498'E" (Google Maps long-press)
  const ddm = str.match(/(\d+)[°]\s*(\d+\.?\d*)['^\u2019]?\s*([NS])[,\s]+(\d+)[°]\s*(\d+\.?\d*)['^\u2019]?\s*([EW])/i);
  if(ddm){
    let lat = +ddm[1] + +ddm[2]/60;
    let lng = +ddm[4] + +ddm[5]/60;
    if(/S/i.test(ddm[3])) lat = -lat;
    if(/W/i.test(ddm[6])) lng = -lng;
    if(lat>=-90&&lat<=90&&lng>=-180&&lng<=180) return {lat,lng};
  }
  // 3. Full DMS: "29°57'40N 30°59'14E"
  const dms = str.match(/(\d+)[°d](\d+)['^m](\d+\.?\d*)["s]?\s*([NS])[,\s]+(\d+)[°d](\d+)['^m](\d+\.?\d*)["s]?\s*([EW])/i);
  if(dms){
    let lat = +dms[1] + +dms[2]/60 + +dms[3]/3600;
    let lng = +dms[5] + +dms[6]/60 + +dms[7]/3600;
    if(/S/i.test(dms[4])) lat = -lat;
    if(/W/i.test(dms[8])) lng = -lng;
    if(lat>=-90&&lat<=90&&lng>=-180&&lng<=180) return {lat,lng};
  }
  return null;
}
function saveFinding(){
  if (currentUser && currentUser.role === 'client_viewer') {
    showNotif('⚠️ Viewers cannot modify findings', true, 3000);
    return;
  }

  const lbl   = document.getElementById('fi-lbl').value.trim();
  const notes = document.getElementById('fi-notes').value.trim();
  const date  = document.getElementById('fi-date').value;
  const coordsRaw = document.getElementById('fi-coords').value.trim();
  const parcel = (document.getElementById('fi-parcel').value || '').trim() || null;

  const escalated = (document.getElementById('fi-escalated').value || '').trim() || null;

  if (!date) {
    showNotif('⚠️ Date of inspection is required', true, 3000);
    return;
  }

  const token = localStorage.getItem('pt_token');

  const okBtn = document.querySelector('#m-fi .mbtns .bok');
  const cancelBtn = document.querySelector('#m-fi .mbtns .bcancel');
  const originalOkText = okBtn ? okBtn.innerHTML : 'Save Finding';
  if (okBtn) {
    okBtn.disabled = true;
    okBtn.innerHTML = '<span style="display:inline-block;animation:save-spin 1s linear infinite;margin-right:6px">⏳</span>Saving...';
    if (!document.getElementById('save-spin-style')) {
      const style = document.createElement('style');
      style.id = 'save-spin-style';
      style.textContent = '@keyframes save-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }';
      document.head.appendChild(style);
    }
  }
  if (cancelBtn) {
    cancelBtn.disabled = true;
  }

  // Upload any locally-held (base64) photos to S3 now, at save time. Entries
  // that are already S3 URLs (existing photos when editing) pass through
  // unchanged. Returns the final list of URLs to store on the visit.
  function resolvePendingPhotos(){
    const jobs = pendingPhotos.map(p => {
      if (typeof p !== 'string' || !p.startsWith('data:')) return Promise.resolve(p);
      return uploadPhotoToServer(dataURLtoBlob(p)).then(res => {
        primePhotoCache(res.key, p);
        return res.key;
      });
    });
    return Promise.all(jobs);
  }

  const hasUploads = pendingPhotos.some(p => typeof p === 'string' && p.startsWith('data:'));
  showNotif(hasUploads ? '⏳ Uploading photos & saving…' : '⏳ Saving finding...', false, 0);

  resolvePendingPhotos().then(photoUrls => {

  const visitPayload = {
    visitDate: date,
    categoryId: categoryLabelToId[CATEGORY_MAP[selectedCat]] || categoryLabelToId['Other'],
    label: lbl,
    notes: notes,
    escalatedToId: escalationLabelToId[escalated] || escalationLabelToId['Not assigned'],
    statusId: statusLabelToId[STATUS_MAP[selectedStat]] || statusLabelToId['1st Offense'],
    photos: photoUrls
  };

  // Parse the coordinates field so edits to an existing finding persist a moved
  // GPS location. Only send lat/lng when they parse to valid numbers; otherwise
  // omit them so the location is left unchanged (and bad input can't blank it).
  const _editLL = coordsRaw ? parseCoords(coordsRaw) : null;
  const editParcelId = resolveParcelId(
    parcel,
    _editLL ? _editLL.lat : (pendingFindingLL ? pendingFindingLL.lat : null),
    _editLL ? _editLL.lng : (pendingFindingLL ? pendingFindingLL.lng : null)
  );
  const editCoords = _editLL ? { lat: Number(_editLL.lat), lng: Number(_editLL.lng) } : {};

  let savePromise;

  if (editingVisitId && editingLocId) {
    savePromise = fetch(`/api/findings/${encodeURIComponent(editingLocId)}/visits/${encodeURIComponent(editingVisitId)}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      // expectedUpdatedAt drives optimistic locking on the server.
      body: JSON.stringify({ siteId: currentSiteId, parcel_id: editParcelId, ...editCoords, ...visitPayload })
    })
    .then(res => {
      if (res.status === 401) { handleUnauthorized(); throw new Error('Unauthorized'); }
      // 404 = the record was deleted by another user while this editor had it
      // open. Close the stale modal, refresh to drop the ghost marker, and tell
      // the user their edit couldn't be saved because the record is gone.
      if (res.status === 404) {
        return res.json().catch(() => ({})).then(d => {
          const err = new Error(d.error || 'This record was already deleted by another user.');
          err.recordDeleted = true;
          throw err;
        });
      }
      if (!res.ok) throw new Error('Failed to update visit');
    });
  } else if (editingLocId) {
    savePromise = fetch(`/api/findings/${encodeURIComponent(editingLocId)}/visits`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ siteId: currentSiteId, parcel_id: editParcelId, ...editCoords, ...visitPayload })
    })
    .then(res => {
      if (res.status === 401) { handleUnauthorized(); throw new Error('Unauthorized'); }
      // 404 = the parent finding was deleted by another user meanwhile.
      if (res.status === 404) {
        return res.json().catch(() => ({})).then(d => {
          const err = new Error(d.error || 'This record was already deleted by another user.');
          err.recordDeleted = true;
          throw err;
        });
      }
      if (!res.ok) throw new Error('Failed to add visit');
    });
  } else {
    const parsedLL = coordsRaw ? parseCoords(coordsRaw) : null;
    const ll = parsedLL || (pendingFindingLL ? {lat:pendingFindingLL.lat, lng:pendingFindingLL.lng} : null);
    if(!ll){
      showNotif('⚠️ Click the map or enter GPS coordinates first', true, 3000);
      return;
    }
    if(coordsRaw && !parsedLL){
      showNotif('⚠️ Could not read those coordinates — try: 29.9612, 30.9874', true, 4000);
      return;
    }
    
    const nearestP = window._nearestParcel ? window._nearestParcel(ll.lat, ll.lng) : null;
    const assignedParcel = parcel || (nearestP ? nearestP.name : null);
    const parcelId = resolveParcelId(parcel, ll.lat, ll.lng);
    if(assignedParcel && !parcelId){
      console.warn('Parcel "' + assignedParcel + '" not found in DB parcels — saving without parcel_id.');
      showNotif('⚠️ Parcel "' + assignedParcel + '" is not in the database — finding saved without a parcel link.', true, 6000);
    } else if(!parcel && nearestP){
      setParcelDropdown(nearestP.name);
    }
    
    const maxRef = findings.reduce((mx,f)=>{ const n=parseInt(f.refNum,10)||0; return n>mx?n:mx; }, 0);
    const nextRef = String(maxRef + 1).padStart(3,'0');

    const payload = {
      siteId: currentSiteId,
      lat: Number(ll.lat),
      lng: Number(ll.lng),
      parcel_id: parcelId,
      ref_num: nextRef,
      visit: visitPayload
    };

    savePromise = fetch('/api/findings', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify(payload)
    })
    .then(res => {
      if (res.status === 401) { handleUnauthorized(); throw new Error('Unauthorized'); }
      if (!res.ok) throw new Error('Failed to create finding');
    });
  }

  return savePromise
  .then(() => {
    if (okBtn) {
      okBtn.disabled = false;
      okBtn.innerHTML = originalOkText;
    }
    if (cancelBtn) {
      cancelBtn.disabled = false;
    }
    document.getElementById('m-fi').style.display = 'none';
    findingsTool = false;
    if(document.getElementById('btn-fi')) document.getElementById('btn-fi').classList.remove('on');
    if(typeof map !== 'undefined' && map) map.getContainer().style.cursor = '';
    pendingFindingLL = null;
    editingLocId = null;
    editingVisitId = null;
    editingVisitUpdatedAt = null;
    pendingPhotos = [];

    loadFindings();
    showNotif('✅ Finding saved');
  });

  }) // end resolvePendingPhotos().then
  .catch(err => {
    console.error(err);
    if (okBtn) {
      okBtn.disabled = false;
      okBtn.innerHTML = originalOkText;
    }
    if (cancelBtn) {
      cancelBtn.disabled = false;
    }
    // The record was deleted by another user: retrying can't help, so close the
    // stale modal and refresh the map to get the latest data. Show the message
    // longer since it asks the user to take note.
    if (err && err.recordDeleted) {
      document.getElementById('m-fi').style.display = 'none';
      findingsTool = false;
      if(document.getElementById('btn-fi')) document.getElementById('btn-fi').classList.remove('on');
      if(typeof map !== 'undefined' && map) map.getContainer().style.cursor = '';
      pendingFindingLL = null;
      editingLocId = null;
      editingVisitId = null;
      editingVisitUpdatedAt = null;
      pendingPhotos = [];
      // Show AFTER the refresh so loadFindings' own notif doesn't clobber it.
      Promise.resolve(loadFindings()).then(() => showNotif('⚠️ ' + err.message, true, 6000));
      return;
    }
    // Upload OR save failure — the modal stays open so nothing is lost and the
    // user can retry. (Locally-held photos remain in pendingPhotos.)
    showNotif('❌ ' + (err && err.message ? err.message : 'Failed to save finding'), true, 4000);
  });
}
window.saveFinding = saveFinding;

function deleteVisit(locId, visitId){
  if (currentUser && currentUser.role === 'client_viewer') {
    showNotif('⚠️ Viewers cannot delete visits', true, 3000);
    return;
  }
  
  if(!confirm('Are you sure you want to delete this visit? This action cannot be undone.')) return;

  const loc = findings.find(f=>f.locId===locId);
  if(!loc) return;
  
  const token = localStorage.getItem('pt_token');
  showNotif('⏳ Deleting visit...', false, 0);

  let deletePromise;

    deletePromise = fetch(`/api/findings/${encodeURIComponent(locId)}?siteId=${encodeURIComponent(currentSiteId)}`, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });

      headers: { 'Authorization': 'Bearer ' + token }

// ── Photo URL registry ────────────────────────────────────────────
// Converts base64 photos to short Blob URLs so they can safely be
// embedded directly in Leaflet popup innerHTML (no size limit issues,
// no event-timing dependency).
window._blobUrls = [];  // tracked for revocation on next render
window._photoUrls = {}; // visitId_index → blob URL (or original b64 as fallback)
window._photoSrcByKey = {}; // visitId_index → original stored value (for retry / lazy load)
window._photoBlobCache = window._photoBlobCache || new Map();   // s3 key → Blob (persistent)
window._photoDataUriCache = window._photoDataUriCache || new Map(); // s3 key → data URI (for fast PDF)
const _photoFetchInflight = new Map(); // s3 key → Promise<Blob>
let _renderFindingsGen = 0;

function clearPhotoCaches(){
  window._photoBlobCache = new Map();
  window._photoDataUriCache = new Map();
  _photoFetchInflight.clear();
}

function primePhotoCache(s3Key, dataUri){
  if(!s3Key || !dataUri) return;
  window._photoDataUriCache.set(s3Key, dataUri);
  if(!window._photoBlobCache.has(s3Key)){
    try{ window._photoBlobCache.set(s3Key, dataURLtoBlob(dataUri)); }catch(e){}
  }
}

function blobToDataUri(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// Background-warm data-URI cache so PDF export skips S3 round-trips.
function prefetchPhotosForPdf(){
  const seen = new Set();
  const srcs = [];
  (findings || []).forEach(loc => {
    (loc.visits || []).forEach(v => {
      (v.photos || []).forEach(p => {
        if(!p || seen.has(p)) return;
        seen.add(p);
        if(/^data:/i.test(p)) return;
        const key = s3KeyFromPhoto(p);
        if(key && window._photoDataUriCache.has(key)) return;
        srcs.push(p);
      });
    });
  });
  if(!srcs.length) return;
  (async () => {
    const BATCH = 8;
    for(let i = 0; i < srcs.length; i += BATCH){
      await Promise.all(srcs.slice(i, i + BATCH).map(s => photoToDataUri(s).catch(() => null)));
    }
  })();
}

function base64ToBlobUrl(b64){
  try{
    const [header, data] = b64.split(',');
    const mime = (header.match(/:(.*?);/)||[])[1] || 'image/jpeg';
    const bin = atob(data);
    const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr], {type:mime}));
    window._blobUrls.push(url);
    return url;
  }catch(e){
    return b64; // fallback: use original URL or base64
  }
}

// S3 photos are presigned https URLs in the API; extract the stored key for our proxy.
function s3KeyFromPhoto(value){
  if(typeof value !== 'string' || /^data:/i.test(value)) return null;
  if(!/^https?:\/\//i.test(value)) return value.startsWith('photos/') ? value : null;
  try{
    const path = decodeURIComponent(new URL(value).pathname.replace(/^\/+/, ''));
    if(path.startsWith('photos/')) return path;
    const idx = path.indexOf('photos/');
    return idx >= 0 ? path.slice(idx) : null;
  }catch(e){ return null; }
}

async function fetchPhotoBlob(src){
  const key = s3KeyFromPhoto(src);
  if(!key) throw new Error('Not an S3 photo');
  if(window._photoBlobCache.has(key)) return window._photoBlobCache.get(key);
  if(_photoFetchInflight.has(key)) return _photoFetchInflight.get(key);
  const fetchP = (async () => {
    const token = localStorage.getItem('pt_token');
    if(!token) throw new Error('Not logged in');
    const qs = 'siteId=' + encodeURIComponent(currentSiteId) +
      '&key=' + encodeURIComponent(key) +
      '&access_token=' + encodeURIComponent(token);
    const res = await fetch('/api/findings/photo?' + qs, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if(res.status === 401) throw new Error('Unauthorized');
    if(!res.ok) throw new Error('Photo fetch failed');
    const blob = await res.blob();
    window._photoBlobCache.set(key, blob);
    return blob;
  })();
  _photoFetchInflight.set(key, fetchP);
  try{
    return await fetchP;
  }finally{
    _photoFetchInflight.delete(key);
  }
}

async function photoToDataUri(src){
  if(!src) return null;
  if(/^data:/i.test(src)) return src;
  const key = s3KeyFromPhoto(src);
  if(!key) return null;
  if(window._photoDataUriCache.has(key)) return window._photoDataUriCache.get(key);
  try{
    let blob;
    try {
      blob = await fetchPhotoBlob(src);
    } catch(proxyErr) {
      // Fallback: fetch presigned S3 URL directly (for PDF export when proxy fails).
      if(/^https?:\/\//i.test(src)){
        const r = await fetch(src);
        if(r.ok) blob = await r.blob();
      }
      if(!blob) throw proxyErr;
      window._photoBlobCache.set(key, blob);
    }
    const dataUri = await blobToDataUri(blob);
    window._photoDataUriCache.set(key, dataUri);
    return dataUri;
  }catch(e){
    console.warn('photoToDataUri failed:', e);
    return null;
  }
}

async function photoToDisplayUrl(src){
  if(!src) return '';
  if(/^data:/i.test(src)) return base64ToBlobUrl(src);
  const key = s3KeyFromPhoto(src);
  if(key && window._photoBlobCache.has(key)){
    const url = URL.createObjectURL(window._photoBlobCache.get(key));
    window._blobUrls.push(url);
    return url;
  }
  // Presigned S3 URLs work directly in <img> — no auth proxy needed.
  if(/^https?:\/\//i.test(src)) return src;
  if(key){
    try{
      const blob = await fetchPhotoBlob(src);
      const url = URL.createObjectURL(blob);
      window._blobUrls.push(url);
      return url;
    }catch(e){
      console.warn('photoToDisplayUrl failed:', e);
      return '';
    }
  }
  return src;
}

// Expose for the PDF <script> block (IIFE scope does not cross script tags).
window.s3KeyFromPhoto = s3KeyFromPhoto;
window.fetchPhotoBlob = fetchPhotoBlob;
window.photoToDataUri = photoToDataUri;
window.photoToDisplayUrl = photoToDisplayUrl;

async function ensurePopupPhoto(img){
  const key = img.dataset.photoKey;
  if(!key) return;
  const src = window._photoSrcByKey[key];
  if(!src) return;
  let url = window._photoUrls[key];
  if(!url){
    url = await photoToDisplayUrl(src);
    if(url) window._photoUrls[key] = url;
  }
  if(url && img.getAttribute('src') !== url){
    img.setAttribute('src', url);
  }
}

function refreshPopupPhotos(marker){
  const el = marker.getPopup() && marker.getPopup().getElement();
  if(!el) return;
  el.querySelectorAll('.fi-popup-photo[data-photo-key]').forEach(img => {
    ensurePopupPhoto(img).catch(e => console.warn('refreshPopupPhotos:', e));
  });
}

window.retryPopupPhoto = function(img){
  if(!img || !img.dataset || img.dataset.retrying === '1') return;
  img.dataset.retrying = '1';
  ensurePopupPhoto(img)
    .catch(e => console.warn('retryPopupPhoto:', e))
    .finally(() => { delete img.dataset.retrying; });
};

// ── Render all finding markers ─────────────────────────────────────
async function renderAllFindings(){
  if(!findingsLayer) return;
  findingsLayer.clearLayers();
  if(window._hideFindings){               // toggle: hide all findings, show only construction
    const _badge = document.getElementById('fi-cnt-badge');
    if(_badge) _badge.textContent = findings.length;  // keep total visible
    ['open','repeat','resolved'].forEach(s=>{
      const el = document.getElementById('fi-c-'+s);
      if(el) el.textContent = '–';
    });
    return;
  }

  const gen = ++_renderFindingsGen;

  // Revoke old blob URLs to prevent memory leaks
  (window._blobUrls||[]).forEach(u=>{ try{URL.revokeObjectURL(u);}catch(e){} });
  window._blobUrls = [];
  window._photoUrls = {};
  window._photoSrcByKey = {};

  // Fetch S3 photos via same-origin proxy (parallel) — avoids expired presigned URLs in popups.
  // Blob + data-URI caches persist across renders so PDF export stays fast.
  const photoEntries = [];
  findings.forEach(loc => {
    loc.visits.forEach(v => {
      (v.photos||[]).forEach((p, pi) => {
        const cacheKey = (v.id||'v')+'_'+pi;
        photoEntries.push({ cacheKey, src: p });
        window._photoSrcByKey[cacheKey] = p;
      });
    });
  });
  await Promise.all(photoEntries.map(async ({ cacheKey, src }) => {
    window._photoUrls[cacheKey] = await photoToDisplayUrl(src);
    // Warm PDF cache from the blob we just fetched (no extra network).
    if(src && !/^data:/i.test(src)) photoToDataUri(src).catch(() => {});
  }));
  if(gen !== _renderFindingsGen) return;

  let counts = {open:0, repeat:0, resolved:0};

  findings.forEach(loc => {
    if(!loc.visits.length) return;
    const latest = loc.visits[0];
    const stat = STAT_CFG[latest.status] || STAT_CFG.open;
    const cat  = CATS.find(c=>c.id===latest.cat) || CATS[CATS.length-1];
    if(window._hideResolved && latest.status === 'resolved') return;
    counts[latest.status] = (counts[latest.status]||0) + 1;

    const shortLbl = latest.label || cat.label;
    const refNum = loc.refNum || '?';
    const refDisplay = parseInt(refNum,10)||refNum;
    const _tc = stat.color;
    const _triSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="64" height="58" viewBox="0 0 64 58">
      <polygon points="32,3 61,55 3,55" fill="${_tc}" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
      <text x="32" y="47" text-anchor="middle" font-size="22" font-weight="900" font-family="Arial,sans-serif" fill="#fff" stroke="#1a1a1a" stroke-width="0.5">${refDisplay}</text>
    </svg>`;
    const icon = L.divIcon({
      html: `<div class="fi-marker-wrap">
        ${_triSVG}
        <div class="fi-marker-label" style="color:${_tc};border:1px solid ${_tc}">${shortLbl}</div>
      </div>`,
      className:'', iconSize:[240,72], iconAnchor:[120,29]
    });

    const marker = L.marker([loc.lat, loc.lng], {icon});
    // Lazy function: popup rebuilt on each open using current _photoUrls
    const _loc = loc;
    marker.bindPopup(function(){ return buildPopup(_loc); }, {maxWidth:320, minWidth:240});
    marker.on('popupopen', () => refreshPopupPhotos(marker));
    findingsLayer.addLayer(marker);
  });

  const badge = document.getElementById('fi-cnt-badge');
  if(badge) badge.textContent = findings.length;
  ['open','repeat','resolved'].forEach(s=>{
    const el = document.getElementById('fi-c-'+s);

// Photos use blob URLs (short, safe for innerHTML) from window._photoUrls
// Can the signed-in user edit/delete findings/zones? Access is SITE-based: any
// admin or engineer assigned to the current site may edit/delete every item on
// it (creator doesn't matter). Client viewers are read-only.
function canModifyItem(){
  if(!currentUser) return false;
  return currentUser.role === 'admin' || currentUser.role === 'engineer';
}

function buildPopup(loc){
  const latest = loc.visits[0];
  const stat = STAT_CFG[latest.status] || STAT_CFG.open;
  const cat  = CATS.find(c=>c.id===latest.cat) || CATS[CATS.length-1];
  const _photoPlaceholder = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

  const canAddVisit = canModifyItem();

  let timelineHTML = loc.visits.map(v => {
    const photos = v.photos || [];
    const vs = STAT_CFG[v.status]||STAT_CFG.open;
    const vc = CATS.find(c=>c.id===v.cat)||CATS[CATS.length-1];
    const photosHTML = photos.map((p, pi) => {
      const cacheKey = (v.id||'v')+'_'+pi;
      const blobUrl = window._photoUrls[cacheKey] || _photoPlaceholder;
      return `<img src="${blobUrl}" data-photo-key="${cacheKey}" class="fi-popup-photo" loading="eager" decoding="async" title="Click to enlarge" onerror="retryPopupPhoto(this)" style="width:60px;height:45px;object-fit:cover;border-radius:3px;cursor:pointer;border:1px solid #ddd;background:#eee">`;
    }).join('');

    // Edit/delete only appear on visits the current user is allowed to modify.
    const actionButtons = canModifyItem() ? `
      <button class="fi-del-btn" onclick="editVisit('${loc.locId}','${v.id}')">✏ edit</button>
      <button class="fi-del-btn" onclick="deleteVisit('${loc.locId}','${v.id}')">✕ delete</button>
    ` : '';
    
    return `<div class="fi-tl-entry">
      <div class="fi-tl-date">${v.date} — ${vc.label}</div>
      <span class="fi-tl-status" style="background:${vs.color}">${vs.emoji} ${vs.label}</span>
      ${actionButtons}
      <div class="fi-tl-note">Visited by: ${v.engineerName}</div>
      ${v.notes ? `<div class="fi-tl-note" style="max-height: 120px; overflow-y: auto; padding-right: 4px;">${v.notes}</div>` : ''}
      ${v.escalated ? `<div class="fi-tl-note" style="color:#7C3AED;font-weight:600">➜ ${v.escalated}</div>` : ''}
      ${photosHTML ? `<div class="fi-tl-photos">${photosHTML}</div>` : ''}
    </div>`;
  }).join('');

  const addVisitButton = canAddVisit ? `
    <button class="fi-add-btn" onclick="addVisitToLocation('${loc.locId}')">+ Add New Visit</button>
  ` : '';

  return `<div class="fi-popup">
    <div class="fi-pop-hdr" style="background:${stat.color}">#${parseInt(loc.refNum||'0',10)||loc.refNum||'?'} · ${cat.label} — ${latest.label||''}</div>
    <div class="fi-pop-body">
      <div class="fi-timeline">${timelineHTML}</div>
      ${addVisitButton}
    </div>
  </div>`;
}

// ── Persistence ────────────────────────────────────────────────────
// Text/coords → localStorage (fast, small)
// Photos       → IndexedDB   (no size limit, survives reload)

const IDB_NAME    = 'PesTrackDB_Gouna';
const IDB_STORE   = 'photos';
const IDB_VERSION = 1;

function openPhotoDb(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess  = e => resolve(e.target.result);
    req.onerror    = e => reject(e.target.error);
  });
}

// Save all photos for all visits into IndexedDB (key = visitId)
async function savePhotosToIdb(findingsArr){
  try{
    const db = await openPhotoDb();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    const store = tx.objectStore(IDB_STORE);
    // Clear old entries first
    store.clear();
    findingsArr.forEach(loc => {
      loc.visits.forEach(v => {
        if(v.photos && v.photos.length){
          store.put(v.photos, v.id);
        }
      });
    });
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  }catch(e){ console.warn('IDB photo save failed:', e); }
}

// Load all photos from IndexedDB and merge into findings array
async function loadPhotosFromIdb(findingsArr){
  try{
    const db = await openPhotoDb();
    const tx = db.transaction(IDB_STORE, 'readonly');
    const store = tx.objectStore(IDB_STORE);
    // Build a map of visitId → photos[]
    const photoMap = {};
    await new Promise((res, rej) => {
      const req = store.openCursor();
      req.onsuccess = e => {
        const cursor = e.target.result;
        if(cursor){ photoMap[cursor.key] = cursor.value; cursor.continue(); }
        else res();
      };
      req.onerror = rej;
    });
    // Merge photos back into findings
    findingsArr.forEach(loc => {
      loc.visits.forEach(v => {
        if(photoMap[v.id]) v.photos = photoMap[v.id];
      });
    });
  }catch(e){ console.warn('IDB photo load failed:', e); }
}

// Translate one API finding (nested location + visits) into the local shape the
// map/editor use (cat/status/date/parcel names). Shared by loadFindings() and
// editVisit() so the field mapping lives in one place.
function mapApiFinding(f){
  const pObj = parcels.find(p => p.id === f.parcel_id)
    || (window._PARCELS || []).find(p => p.id === f.parcel_id);
  const parcelName = pObj ? (pObj.parcel_name || pObj.name || '') : '';

  return {
    locId: f.id,
    lat: Number(f.lat),
    lng: Number(f.lng),
    refNum: f.ref_num,
    parcel: parcelName,
    visits: f.visits.map(v => {
      const catLabel = categoryIdToLabel[v.categoryId];
      const legacyCat = Object.keys(CATEGORY_MAP).find(k => CATEGORY_MAP[k] === catLabel) || 'other';

      const statusLabel = statusIdToLabel[v.statusId];
      const legacyStatus = Object.keys(STATUS_MAP).find(k => STATUS_MAP[k] === statusLabel) || 'open';

      return {
        id: v.id,
        date: v.visitDate,
        cat: legacyCat,
        status: legacyStatus,
        label: v.label || '',
        notes: v.notes || '',
        escalated: escalationIdToLabel[v.escalatedToId] || '',
        createdByName: v.createdByName || 'Unknown',
        createdById: v.createdById || null,
        engineerName: v.engineerName || 'Unknown',
        engineerId: v.engineerId || null,
        updatedAt: v.updatedAt || null,
        photos: v.photos || []
      };
    })
  };
}

function loadFindings(){
  if (!currentSiteId) return Promise.resolve();
  const token = localStorage.getItem('pt_token');
  showNotif('⏳ Loading findings...', false, 0);
  // Return the promise so callers can chain a message that must appear AFTER
  // the "✅ Findings loaded" notification (otherwise loadFindings overwrites it).
  return fetch('/api/findings?siteId=' + currentSiteId, {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(res => {
    if (res.status === 401) { handleUnauthorized(); throw new Error('Unauthorized'); }
    if (!res.ok) throw new Error('Failed to fetch findings');
    return res.json();
  })
  .then(data => {
    findings = data.findings.map(mapApiFinding);
    window._ptFindings = findings;
    return renderAllFindings().then(() => {
      prefetchPhotosForPdf();
      showNotif('✅ Findings loaded');
    });
  })
  .catch(err => {
    console.error(err);
    showNotif('❌ Failed to load findings', true, 3000);
  });
}

  const u = document.getElementById('username').value.trim();

function bootApp() {
  const token = localStorage.getItem('pt_token');
  showNotif('⏳ Initializing dashboard...', false, 0);
  
  fetch('/api/references', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(res => res.json())
  .then(refData => {
    refData.categories.forEach(c => {
      categoryLabelToId[c.label] = c.id;
      categoryIdToLabel[c.id] = c.label;
    });
    refData.statuses.forEach(s => {
      statusLabelToId[s.label] = s.id;
      statusIdToLabel[s.id] = s.label;
    });
    refData.escalations.forEach(e => {
      escalationLabelToId[e.label] = e.id;
      escalationIdToLabel[e.id] = e.label;
    });

    // ── Bind category buttons from the API ──────────────────────────
    // Rebuild CATS from the DB rows so the popup grid reflects the API
    // (labels, colors, order). Categories bind POSITIONALLY to the legacy
    // ids (the CATEGORY_MAP key order) so renamed DB labels still work; we
    // also remap CATEGORY_MAP itself so incoming-finding conversion and the
    // save path resolve against the real DB labels — not the hardcoded ones.
    if (Array.isArray(refData.categories) && refData.categories.length) {
      const _legacyCatIds = Object.keys(CATEGORY_MAP);   // ['stp_trench', …]
      const _prevById = {}; CATS.forEach(c => _prevById[c.id] = c);
      const _apiCats = refData.categories.map((c, i) => {
        const legacyId = _legacyCatIds[i] || 'other';
        CATEGORY_MAP[legacyId] = c.label;                // legacy id → real DB label
        const prev = _prevById[legacyId];
        return {
          id: legacyId,
          label: c.label,
          color: c.color || (prev ? prev.color : '#374151'),
        };
      });
      CATS.length = 0;
      _apiCats.forEach(c => CATS.push(c));
      window._CATS = CATS;
    }

    // ── Bind status buttons from the API ────────────────────────────
    // The app is hardwired to 3 legacy status ids ('open' | 'repeat' |
    // 'resolved'), driving static buttons, marker/PDF colors and counts.
    // The DB may rename the labels, so we bind POSITIONALLY by sort_order
    // (already ORDER BY sort_order ASC): 1st→open, 2nd→repeat, 3rd→resolved.
    // We remap STATUS_MAP itself so every downstream lookup (incoming-finding
    // conversion, save path) uses the real DB labels — not the hardcoded ones.
    if (Array.isArray(refData.statuses) && refData.statuses.length) {
      const _legacyStatus = ['open','repeat','resolved'];
      refData.statuses.slice(0, 3).forEach((s, i) => {
        const legacyId = _legacyStatus[i];
        STATUS_MAP[legacyId] = s.label;              // legacy id → real DB label
        const prev = STAT_CFG[legacyId] || {};
        STAT_CFG[legacyId] = {
          label: s.label || prev.label,
          color: s.color || prev.color,
          emoji: s.emoji || prev.emoji,
        };
      });
    }

    return fetch('/api/sites', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
  })
  .then(res => res.json())
  .then(sitesData => {
    sites = sitesData.data || [];

    // Always apply role permissions (reveal the allowed header buttons — they
    // start hidden) and initialize the map, even when the user has no assigned
    // sites — otherwise the gated buttons stay hidden and the map never renders.
    const userRole = currentUser ? currentUser.role : 'client_viewer';
    applyPermissions(userRole);

    const picker = document.getElementById('site-selector');
    picker.innerHTML = '';
    sites.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name;
      picker.appendChild(opt);
    });
    // Only show the dropdown once there are sites to pick from.
    picker.style.display = sites.length > 0 ? '' : 'none';

    // Permissions applied and sites bound → now reveal the toolbar as a whole,
    // so buttons appear all at once (no flash of all buttons before hiding).
    const toolbar = document.getElementById('hdr-toolbar');
    if (toolbar) toolbar.style.display = '';

    if (typeof map === 'undefined' || !map) {
      init();
      initFindings();
    }

    buildEscalationSelect();

    if (sites.length === 0) {
      // No sites assigned: map is initialized but there's nothing to load.
      currentSiteId = null;
      showNotif('❌ No sites assigned to your account. Contact an administrator.', true, 6000);
      return;
    }

    currentSiteId = sites[0].id;
    changeSite(currentSiteId);
  })
  .catch(err => {
    console.error(err);
    showNotif('❌ Failed to initialize app', true, 5000);
    // Reveal the toolbar even on failure so the always-available controls work.
    // Gated buttons stay hidden (safe default) since permissions never applied.
    const toolbar = document.getElementById('hdr-toolbar');
    if (toolbar) toolbar.style.display = '';
  });
}

function applyPermissions(role) {
  const btnFi = document.getElementById('btn-fi');
  const btnCz = document.getElementById('btn-cz');
  const btnExport = document.getElementById('btn-export');
  const btnImport = document.getElementById('btn-import');
  const btnUpdateParcels = document.getElementById('btn-parcels');
  const btnPdf = document.getElementById('btn-pdf');

  // Header profile menu: shows who's signed in and their role (so a client
  // viewer understands why edit controls are hidden) plus the logout action.
  const ROLE_META = {
    admin:         { label: 'Admin',  color: '#7C3AED' },
    engineer:      { label: 'Engineer', color: '#0F766E' },
    client_viewer: { label: 'Viewer', color: '#64748B' },
  };
  const menuWrap = document.getElementById('user-menu-wrap');
  if (menuWrap) {
    const meta = ROLE_META[role] || ROLE_META.client_viewer;
    const displayName = (currentUser && (currentUser.fullName || currentUser.username)) || '';
    document.getElementById('user-menu-name').textContent = displayName;
    const rolePill = document.getElementById('user-menu-role');
    rolePill.textContent = meta.label;
    rolePill.style.background = meta.color;
    // Avatar initials from the display name (up to 2 letters).
    const initials = displayName.trim().split(/\s+/).map(w => w[0] || '')
      .slice(0, 2).join('').toUpperCase() || '?';
    document.getElementById('profile-initials').textContent = initials;
    document.getElementById('profile-btn').style.borderColor = meta.color;
    document.getElementById('profile-btn').style.color = meta.color;
    menuWrap.style.display = 'block';
  }

  if (role === 'client_viewer') {
    if (btnFi) btnFi.style.display = 'none';
    if (btnCz) btnCz.style.display = 'none';
    if (btnExport) btnExport.style.display = 'none';
    if (btnImport) btnImport.style.display = 'none';
    if (btnUpdateParcels) btnUpdateParcels.style.display = 'none';
    if (btnPdf) btnPdf.style.display = '';
  } else if (role === 'engineer') {
    if (btnFi) btnFi.style.display = '';
    if (btnCz) btnCz.style.display = 'none';
    if (btnExport) btnExport.style.display = 'none';
    if (btnImport) btnImport.style.display = 'none';
    if (btnUpdateParcels) btnUpdateParcels.style.display = 'none';
    if (btnPdf) btnPdf.style.display = 'none';
  } else if (role === 'admin') {
    if (btnFi) btnFi.style.display = '';
    if (btnCz) btnCz.style.display = '';
    if (btnExport) btnExport.style.display = '';
    if (btnImport) btnImport.style.display = '';
    if (btnUpdateParcels) btnUpdateParcels.style.display = '';
    if (btnPdf) btnPdf.style.display = '';
  }
}
